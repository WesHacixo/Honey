name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.40.x
        
    - name: Cache Deno dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/deno
        key: ${{ runner.os }}-deno-${{ hashFiles('**/*.ts') }}
        restore-keys: |
          ${{ runner.os }}-deno-
          
    - name: Check formatting
      run: deno fmt --check
      
    - name: Run linter
      run: deno lint
      
    - name: Run tests
      run: deno run --allow-read --allow-write --allow-net --allow-run tests/run_tests.ts
      
    - name: Run type checking
      run: deno check **/*.ts

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.40.x
        
    - name: Run security audit
      run: |
        # Check for common security issues
        echo "🔍 Scanning for security issues..."
        
        # Check for hardcoded secrets
        if grep -r "password\|secret\|key\|token" --include="*.ts" --include="*.js" --exclude-dir=tests .; then
          echo "⚠️ Potential hardcoded secrets found"
          exit 1
        fi
        
        # Check for eval usage
        if grep -r "eval(" --include="*.ts" --include="*.js" .; then
          echo "⚠️ Dangerous eval() usage found"
          exit 1
        fi
        
        echo "✅ Security scan passed"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        if [ -f Dockerfile ]; then
          docker build -t honey-benchmark:test .
          echo "✅ Docker build successful"
        else
          echo "ℹ️ No Dockerfile found, skipping Docker build"
        fi

  benchmark-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.40.x
        
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3
      
    - name: Run integration test
      run: |
        echo "🧪 Running integration tests..."
        
        # Test basic benchmark functionality
        timeout 60s deno run --allow-all bench/index.ts --list || {
          echo "❌ Failed to list combs"
          exit 1
        }
        
        echo "✅ Integration tests passed"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, security-scan, docker-build, benchmark-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create release tag
      run: |
        # Generate version based on date and commit
        VERSION="v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # Create and push tag
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$VERSION" -m "Automated release $VERSION"
        git push origin "$VERSION"
        
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.VERSION }}
        release_name: Release ${{ env.VERSION }}
        body: |
          Automated release of Honey Benchmark Swarm
          
          ## Changes
          - Latest improvements and bug fixes
          - All tests passing
          - Security scan passed
          
          ## Installation
          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd Honey
          deno run --allow-all bench/index.ts
          ```
        draft: false
        prerelease: false

